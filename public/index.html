<!DOCTYPE html><html lang="tr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Ana Sayfa</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;} body{background:#121212;color:#fff;}
header{padding:15px;background:#1f1f1f;text-align:center;font-size:20px;font-weight:bold;color:#e50914;}
.cats{display:flex;gap:10px;padding:15px;overflow-x:auto;white-space:nowrap;}
.cats button{padding:10px 15px;background:#333;color:#fff;border:none;border-radius:20px;cursor:pointer;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:15px;padding:15px;}
.card{background:#1f1f1f;border-radius:8px;overflow:hidden;text-align:center;}
.card img{width:100%;height:180px;object-fit:cover;} .card h3{font-size:14px;padding:10px;}
</style></head><body>
<header>Kekik Yayın</header>
<div class="cats">
    <button onclick="load('netflix')">Netflix</button> <button onclick="load('exxen')">Exxen</button>
    <button onclick="load('blutv')">BluTV</button> <button onclick="load('disney-plus')">Disney+</button>
</div>
<main id="grid" class="grid"></main>
<script>
window.onload = () => load('netflix');
async function load(cat) {
    const grid = document.getElementById('grid'); grid.innerHTML = 'Yükleniyor...';
    const res = await fetch(`/api/category?name=${cat}`); const result = await res.json();
    grid.innerHTML = '';
    result.data.forEach(item => {
        const div = document.createElement('div'); div.className = 'card';
        div.innerHTML = `<img src="${item.poster}"><h3>${item.title}</h3>`;
        div.onclick = () => window.location.href = `dizi.html?url=${encodeURIComponent(item.link)}`;
        grid.appendChild(div);
    });
}
</script></body></html>
