<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sınırsız Oynatıcı</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; overflow: hidden; }
        .btn-back { position: absolute; top: 0; left: 0; width: 100%; padding: 15px; background: #e50914; color: #fff; text-decoration: none; text-align: center; font-weight: bold; z-index: 10; box-sizing: border-box;}
        video { width: 100%; height: 100vh; outline: none; background: #000; }
        #info { padding: 20px; text-align: center; color: #aaa; z-index: 5; margin-top: 50px; line-height: 1.6;}
        
        .fallback-btn { display: inline-block; margin-top: 20px; padding: 15px 30px; background: #e50914; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

<a href="#" onclick="history.back()" class="btn-back">⬅ Bölümlere Dön</a>
<h3 id="info">Bağlantı Kuruluyor... ⏳</h3>
<video id="video" controls playsinline style="display:none;"></video>

<script>
async function initPlayer() {
    const info = document.getElementById('info');
    const video = document.getElementById('video');
    
    // BURADAKİ HARF HATASI DÜZELTİLDİ! (URLSearchParams)
    const urlParams = new URLSearchParams(window.location.search);
    const url = urlParams.get('url');
    
    try {
        const res = await fetch(`/api/video?url=${encodeURIComponent(url)}`);
        const data = await res.json();
        
        if(data.success) {
            // NORMAL VİDEOLAR
            info.style.display = 'none';
            const proxyUrl = `/api/proxy_m3u8?url=${encodeURIComponent(data.m3u8)}&referer=${encodeURIComponent(data.referer)}`;
            
            video.style.display = 'block';
            if(Hls.isSupported()){ 
                const hls = new Hls({ maxBufferSize: 20 * 1000 * 1000 }); 
                hls.loadSource(proxyUrl); 
                hls.attachMedia(video); 
                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
            } else if(video.canPlayType('application/vnd.apple.mpegurl')) { 
                video.src = proxyUrl; 
                video.play(); 
            }
        } 
        else if(data.fallback) {
            // İNATÇI VİDEOLAR İÇİN (Direkt izleme sayfasına fırlatır)
            // Eğer uygulama otomatik yönlendirmeyi engellerse diye buton ekledim.
            info.innerHTML = `
                Özel Video Kaynağına Yönlendiriliyor... 🚀<br>
                <a href="${data.fallback}" class="fallback-btn">Eğer Açılmazsa Buraya Tıkla</a>
            `;
            
            setTimeout(() => {
                window.location.replace(data.fallback);
            }, 1000);
        }
        else { 
            info.innerText = 'Video Kaynağı Bulunamadı: ' + (data.message || ''); 
        }
    } catch(e) { 
        info.innerText = 'Sunucu Hatası!'; 
    }
}
initPlayer();
</script>
</body>
</html>
