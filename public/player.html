<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sınırsız Oynatıcı</title>
    <!-- Referer etiketi video sitelerini bozduğu için KODDAN KALDIRILDI -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; overflow: hidden; }
        .btn-back { position: absolute; top: 0; left: 0; width: 100%; padding: 15px; background: #e50914; color: #fff; text-decoration: none; text-align: center; font-weight: bold; z-index: 10; box-sizing: border-box;}
        
        video { width: 100%; height: 100vh; outline: none; background: #000; }
        iframe { width: 100%; height: 100vh; border: none; background: #000; display: none; margin-top: 50px; }
        
        #info { padding: 20px; text-align: center; color: #aaa; z-index: 5; margin-top: 50px;}
        .alt-btn { display:none; padding:15px; background:#e50914; color:#fff; text-decoration:none; font-weight:bold; border-radius:10px; margin-top:20px; text-align:center; max-width: 90%; word-break: break-all; }
        
        .debug-link { font-size: 11px; color: #555; margin-top: 10px; text-align: center; display: none; padding: 0 10px;}
    </style>
</head>
<body>

<a href="#" onclick="history.back()" class="btn-back">⬅ Bölümlere Dön</a>
<h3 id="info">Güvenlik Duvarı Aşılıyor... ⏳</h3>

<video id="video" controls playsinline style="display:none;"></video>
<iframe id="iframe" allowfullscreen></iframe>

<a id="alt-btn" class="alt-btn" href="#" target="_blank">Eğer açılmazsa Harici Oynatıcıda Aç</a>
<div id="debug-link" class="debug-link"></div>

<script>
async function initPlayer() {
    const info = document.getElementById('info');
    const video = document.getElementById('video');
    const iframe = document.getElementById('iframe');
    const altBtn = document.getElementById('alt-btn');
    const debugLink = document.getElementById('debug-link');
    const url = new URLSearchParams(window.location.search).get('url');
    
    try {
        const res = await fetch(`/api/video?url=${encodeURIComponent(url)}`);
        const data = await res.json();
        
        if(data.success) {
            info.style.display = 'none';
            const proxyUrl = `/api/proxy_m3u8?url=${encodeURIComponent(data.m3u8)}&referer=${encodeURIComponent(data.referer)}`;
            video.style.display = 'block';
            
            if(Hls.isSupported()){ 
                const hls = new Hls({ maxBufferSize: 20 * 1000 * 1000 }); 
                hls.loadSource(proxyUrl); 
                hls.attachMedia(video); 
                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
            } else if(video.canPlayType('application/vnd.apple.mpegurl')) { 
                video.src = proxyUrl; 
                video.play(); 
            }
        } 
        else if (data.fallback) {
            info.style.display = 'none';
            video.style.display = 'none';
            
            iframe.style.display = 'block';
            iframe.src = data.fallback;
            
            altBtn.style.display = 'block';
            altBtn.href = data.fallback;

            // Arka planda Vercel'in bulduğu o bozuk/sağlam linki ekrana yazdırır. 
            // Eğer tekrar 404 alırsan bu linke bakarak asıl sorunu çözebiliriz!
            debugLink.style.display = 'block';
            debugLink.innerText = "Kaynak Linki: " + data.fallback;
        } 
        else { 
            info.innerText = 'Hata: ' + (data.message || 'Bulunamadı'); 
        }
    } catch(e) {
        info.innerText = 'Sunucu Hatası!';
    }
}
initPlayer();
</script>

</body>
</html>
