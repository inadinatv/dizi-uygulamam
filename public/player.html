<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oynatıcı</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        .back-btn { position: absolute; top: 0; left: 0; width: 100%; padding: 15px; background: rgba(229, 9, 20, 0.8); color: #fff; text-decoration: none; text-align: center; z-index: 100; font-weight: bold; }
        iframe { width: 100%; height: 100vh; border: none; }
        #loader { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; text-align: center; }
    </style>
</head>
<body>

<a href="#" onclick="history.back()" class="back-btn">⬅ Bölümlere Dön</a>
<div id="loader">Video Hazırlanıyor...</div>
<div id="player-container"></div>

<script>
async function loadVideo() {
    const url = new URLSearchParams(window.location.search).get('url');
    try {
        const res = await fetch(`/api/video?url=${encodeURIComponent(url)}`);
        const data = await res.json();
        
        if(data.success) {
            document.getElementById('loader').style.display = 'none';
            // Siyah ekranı bitiren 'Referrer Policy' ayarlı iframe
            const iframe = document.createElement('iframe');
            iframe.src = data.embedUrl;
            iframe.allowFullscreen = true;
            iframe.setAttribute('referrerpolicy', 'no-referrer'); // KORUMALARI KIRAN KRİTİK SATIR
            document.getElementById('player-container').appendChild(iframe);
        } else {
            document.getElementById('loader').innerText = "Hata: Video Kaynağı Bulunamadı.";
        }
    } catch(e) {
        document.getElementById('loader').innerText = "Sunucu Bağlantı Hatası.";
    }
}
loadVideo();
</script>
</body>
</html>
